<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ファクトシート整形</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Segoe UI", sans-serif;
      margin: 0; padding: 16px; color: #1a1a1a; font-size: 13px;
    }
    h1 { font-size: 15px; font-weight: 600; margin: 0 0 4px; }
    .sub { color: #666; margin: 0 0 16px; font-size: 12px; }
    button#run {
      width: 100%; padding: 12px; font-size: 14px; font-weight: 600;
      background: #141414; color: #fff; border: none; border-radius: 6px;
      cursor: pointer;
    }
    button#run:disabled { background: #999; cursor: default; }
    button#run:hover:not(:disabled) { background: #333; }
    #status { margin-top: 16px; line-height: 1.7; }
    .ok { color: #0a6b2d; }
    .warn { background: #fff4e0; border-left: 3px solid #e8a13c; padding: 8px 10px; margin: 8px 0; }
    .error { background: #fdecec; border-left: 3px solid #d43c3c; padding: 8px 10px; margin: 8px 0; }
    pre.debug { background: #f5f5f5; border: 1px solid #ddd; border-radius: 4px; padding: 8px;
      font-size: 10px; line-height: 1.5; white-space: pre-wrap; word-break: break-all;
      max-height: 240px; overflow-y: auto; user-select: text; }
    table.fields { border-collapse: collapse; margin-top: 8px; width: 100%; }
    table.fields td { padding: 3px 6px; border-bottom: 1px solid #eee; vertical-align: top; }
    table.fields td:first-child { color: #666; white-space: nowrap; width: 5em; }
    .note { color: #888; font-size: 11px; margin-top: 16px; line-height: 1.6; }
    .ver { color: #bbb; font-size: 10px; margin-top: 12px; text-align: right; }
    fieldset.opts { border: 1px solid #ddd; border-radius: 6px; padding: 10px 12px; margin: 0 0 14px; }
    fieldset.opts legend { font-size: 12px; color: #666; padding: 0 4px; }
    fieldset.opts .row { display: flex; align-items: center; justify-content: space-between; margin: 6px 0; }
    fieldset.opts label { font-size: 13px; }
    fieldset.opts select { font-size: 13px; padding: 3px 6px; border: 1px solid #ccc; border-radius: 4px; min-width: 9em; }
    fieldset.opts .hint { font-size: 11px; color: #999; margin: 6px 0 0; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>ファクトシート整形</h1>
  <p class="sub">Artlogic書き出しのファクトシートを社内書式に整形します</p>
  <fieldset class="opts">
    <legend>価格の形式（整形前に選択）</legend>
    <div class="row">
      <label for="currencyMode">通貨</label>
      <select id="currencyMode">
        <option value="auto">単一通貨</option>
        <option value="dual">円・USD併記</option>
      </select>
    </div>
    <div class="row">
      <label for="framingMode">額装（Framing）価格</label>
      <select id="framingMode">
        <option value="auto">なし</option>
        <option value="framed">あり</option>
      </select>
    </div>
    <p class="hint">通常は「単一通貨／なし」のままでOK（元ファイルが併記・額装の場合は自動で反映されます）。強制的に併記・額装にしたい場合のみ変更してください。元ファイルに無い金額は「（要入力）」と表示されるので手動で上書きしてください。</p>
  </fieldset>
  <button id="run" disabled>整形を実行</button>
  <div id="status"></div>
  <p class="note">
    整形後は必ず内容を確認してから保存してください。<br>
    結果を取り消すには保存せずに閉じるか、⌘Z（元に戻す）を使用します。<br>
    うまく整形されない場合は、そのファイルをPR担当（Kawasaki）に共有してください。
  </p>
  <div id="ver" class="ver"></div>
  <script src="taskpane.js?v=1.1.3"></script>
</body>
</html>
